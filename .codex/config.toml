[features]
multi_agent = true

[agents]
max_threads = 5
max_depth = 1

[agents.runtime_validator]
description = "Read-only runtime baseline validator for health, readiness, configs, and critical contracts."
config_file = "agents/runtime-validator.toml"

[agents.viewer_consolidator]
description = "Read-only explorer for viewer flows, API and UI contracts, and evidence consolidation."
config_file = "agents/viewer-consolidator.toml"

[agents.runbook_writer]
description = "Artifact-first documentation writer for runbooks and operator guidance."
config_file = "agents/runbook-writer.toml"

[agents.verifier]
description = "Read-only gatekeeper that checks handoff completeness, contradictions, and blockers before synthesis."
config_file = "agents/verifier.toml"

[agents.synthesizer]
description = "Single final writer that assembles the package after verifier approval and keeps unrelated files untouched."
config_file = "agents/synthesizer.toml"

[agents.docs_researcher]
description = "Documentation specialist that uses MCP only for external or version-sensitive facts."
config_file = "agents/docs-researcher.toml"

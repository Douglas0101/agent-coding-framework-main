spec_id: "verification.stable-execution"
version: "1.0.0"
status: "approved"
domain: "agent-coding-framework"
description: >
  Especificacao de verificacao para execucao estavel de agentes.
  Define testes de transicao de estado, property tests, contract tests,
  replay tests, regression tests e negative tests.
acceptance_criteria:
  - id: "AC-001"
    description: "Ausencia de loop nao limitado"
    test_type: "property_test"
    property: "no_unbounded_retry"
    verification: "Todo retry deve ter counter decrescente e cutoff verificavel"
    evidence_required: true

  - id: "AC-002"
    description: "Retry sempre finito e observavel"
    test_type: "property_test"
    property: "no_unbounded_retry"
    verification: "retry_count <= max_retries (3) em todos os nos"
    evidence_required: true

  - id: "AC-003"
    description: "Resume sem reexecucao global desnecessaria"
    test_type: "property_test"
    property: "idempotent_resume"
    verification: "Mesmo checkpoint + mesmo input = mesmo outcome"
    evidence_required: true

  - id: "AC-004"
    description: "Handoffs 100% compativeis com schema"
    test_type: "contract_test"
    property: "handoff_schema_always_valid"
    verification: "Todo handoff valida contra contract.agent-handoff schema"
    evidence_required: true

  - id: "AC-005"
    description: "Nenhuma escrita final fora do synthesizer"
    test_type: "negative_test"
    property: "no_forbidden_transition"
    verification: "Apenas synthesizer pode produzir artefato final"
    evidence_required: true

  - id: "AC-006"
    description: "Verifier bloqueia promocao de saida invalida"
    test_type: "state_transition_test"
    property: "verifier_gate_enforced"
    verification: "running -> synthesized e transicao proibida"
    evidence_required: true

  - id: "AC-007"
    description: "Execucao paralela sem colisao de write_scope"
    test_type: "property_test"
    property: "no_double_write_same_scope"
    verification: "Dois workers nunca escrevem no mesmo write_scope"
    evidence_required: true

  - id: "AC-008"
    description: "Runtime alinhado a spec apos patch"
    test_type: "replay_test"
    property: "same_input_same_checkpoint_same_outcome"
    verification: "Golden traces devem reproduzir resultados identicos"
    evidence_required: true

  - id: "AC-009"
    description: "Regressao coberta por testes automatizados"
    test_type: "regression_test"
    property: "all_regression_tests_pass"
    verification: "Suite de regressao executa sem falhas"
    evidence_required: true

  - id: "AC-010"
    description: "Roteamento de comandos para agentes corretos"
    test_type: "contract_test"
    property: "command_routing_correct"
    verification: "Todo comando com agent: no frontmatter roteado corretamente"
    evidence_required: true

test_suites:
  state_transition_tests:
    - name: "test_no_running_to_running_without_progress"
      description: "Verifica que running -> running sem progresso e rejeitado"
      setup: "Criar run em estado running"
      action: "Tentar transicao running -> running sem nova evidencia"
      expected: "Transicao rejeitada"

    - name: "test_no_synthesized_before_verified"
      description: "Verifica que synthesized nao ocorre antes de verified"
      setup: "Criar run em estado running"
      action: "Tentar transicao running -> synthesized"
      expected: "Transicao rejeitada, deve passar por validating -> verified"

    - name: "test_retry_bounded"
      description: "Verifica que retry tem limite maximo"
      setup: "Criar run com retry_count = max_retries"
      action: "Tentar nova transicao para retrying"
      expected: "Transicao para failed, nao retrying"

    - name: "test_verifier_gate"
      description: "Verifica gate do verifier antes de synthesizer"
      setup: "Criar run em estado validating com validation_fails"
      action: "Tentar transicao para synthesized"
      expected: "Transicao rejeitada"

    - name: "test_checkpoint_resume"
      description: "Verifica resume a partir de checkpoint valido"
      setup: "Criar run em estado checkpointed com checkpoint valido"
      action: "Solicitar resume"
      expected: "Transicao para running com mesmo estado"

  property_tests:
    - name: "test_no_unbounded_retry"
      description: "Property: retry_count nunca excede max_retries"
      property: "forall run: retry_count(run) <= max_retries"

    - name: "test_idempotent_resume"
      description: "Property: mesmo checkpoint + input = mesmo outcome"
      property: "forall checkpoint, input: outcome(checkpoint, input) = outcome(checkpoint, input)"

    - name: "test_no_double_write_same_scope"
      description: "Property: nenhum write_scope e escrito por dois workers"
      property: "forall scope: writers(scope).length <= 1"

    - name: "test_handoff_schema_always_valid"
      description: "Property: todo handoff valida contra schema"
      property: "forall handoff: validate(handoff, schema) = true"

    - name: "test_same_input_same_checkpoint_same_outcome"
      description: "Property: determinismo de execucao"
      property: "forall input: execute(input) = execute(input)"

  contract_tests:
    - name: "test_handoff_schema_validation"
      description: "Verifica que handoffs contem todos os campos obrigatorios"
      schema_ref: "contract.agent-handoff"
      required_fields:
        - "schema_version"
        - "artifact_type"
        - "producer_agent"
        - "consumer_agent"
        - "spec_id"
        - "spec_version"
        - "run_id"
        - "timestamp"
        - "evidence_refs"
        - "risk_level"
        - "compatibility_assessment"
        - "trace_links"

    - name: "test_command_routing"
      description: "Verifica roteamento de comandos para agentes corretos"
      test_cases:
        - command: "autocode"
          expected_agent: "autocoder"
        - command: "ship"
          expected_agent: "orchestrator"
        - command: "review"
          expected_agent: "reviewer"
        - command: "analyze"
          expected_agent: "explore"
        - command: "test-scope"
          expected_agent: "tester"
        - command: "ops-report"
          expected_agent: "autocoder"

  replay_tests:
    - name: "test_golden_trace_routing"
      description: "Replay de golden trace para roteamento de comandos"
      golden_trace: "command/autocode -> agent/autocoder"
      expected_outcome: "agent=autocoder, maxSteps=6"

  regression_tests:
    - name: "test_no_loop_regression"
      description: "Regressao: ausencia de loops nao limitados"
      test_cases:
        - "retry sem limite"
        - "reentrada sem checkpoint"
        - "reprocessamento sem idempotency key"
        - "transicao circular sem progresso"

    - name: "test_no_break_regression"
      description: "Regressao: ausencia de quebras de execucao"
      test_cases:
        - "timeout sem recuperacao"
        - "falha parcial sem resume"
        - "handoff invalido"
        - "perda de contexto"

    - name: "test_no_desync_regression"
      description: "Regressao: ausencia de dessincronizacao"
      test_cases:
        - "write_scope compartilhado"
        - "race condition"
        - "artefato fora de ordem"
        - "incompatibilidade de contrato"

  negative_tests:
    - name: "test_forbidden_transitions_rejected"
      description: "Verifica que transicoes proibidas sao rejeitadas"
      forbidden_transitions:
        - "running -> running (sem progresso)"
        - "retrying -> retrying (infinito)"
        - "running -> synthesized (sem verified)"
        - "parallel_write (mesmo write_scope)"
        - "resume (sem checkpoint)"
        - "handoff (sem contract validation)"

    - name: "test_silent_fallback_rejected"
      description: "Verifica que fallback silencioso e rejeitado"
      setup: "Remover .opencode/opencode.json"
      action: "Executar comando /autocode"
      expected: "Falha explicita com evidencia, nao fallback para general"

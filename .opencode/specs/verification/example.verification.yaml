verification_id: verification.example
version: 1.0.0
capability_ref: capability.example
behavior_ref: example.processing-flow
description: >
  Especificação de verificação derivada das invariantes e da máquina de estados
  da capability de exemplo. Define os critérios de aceite verificáveis por máquina.

acceptance_criteria:
  - toda decisão deve possuir evidence_ref resolvível
  - nenhuma transição proibida pode aparecer em trace
  - output sem producer_agent é rejeitado antes de handoff
  - toda run crítica deve gerar run-manifest com trace_links mínimos

properties:
  - name: idempotency
    statement: >
      Mesma chave de idempotência e mesmo payload produzem
      o mesmo resultado lógico em qualquer número de execuções.
    test_type: property_based

  - name: auditability
    statement: >
      Todo artefato produzido por agentes de risco high/critical
      possui evidence_refs resolvíveis e audit_record persistido.
    test_type: invariant

  - name: forbidden_transitions
    statement: >
      Nenhuma transição marcada como forbidden no behavior spec
      pode ser observada em trace de execução.
    test_type: model_check

model_checks:
  - no_dead_end_before_terminal_state
  - forbidden_transitions_never_observed
  - all_states_reachable_from_initial

generated_tests:
  - contract_tests
  - property_tests
  - state_transition_tests
  - replay_tests
  - negative_spec_tests

negative_specs:
  - description: received → completed sem passar por validated é inválido
    forbidden_sequence: [received, completed]
  - description: output sem schema_version é rejeitado
    forbidden_condition: missing_field:schema_version

required_evidence:
  - test_execution_report
  - contract_validation_report
  - property_test_results

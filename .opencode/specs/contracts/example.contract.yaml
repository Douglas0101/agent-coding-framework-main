contract_id: contract.example-handoff
version: 1.0.0
schema_version: "1.0.0"
status: approved
capability_ref: capability.example
description: >
  Contrato de handoff entre agentes para o fluxo de exemplo.
  Todo artefato trocado entre agentes deve conformar com este schema.

producer_agents:
  - autocoder
  - reviewer

consumer_agents:
  - tester
  - synthesis

artifact_types:
  - review-result
  - test-result

required_fields:
  - schema_version
  - artifact_type
  - producer_agent
  - spec_id
  - spec_version
  - run_id
  - timestamp
  - risk_level
  - evidence_refs
  - trace_links

compatibility_rules:
  - type: additive-only
    description: novos campos opcionais são additive-compatible
  - type: breaking-requires-approval
    description: remoção ou renomeação de campo requer aprovação explícita e major version bump

evolution:
  current_major: 1
  deprecation_policy: campo deprecado deve ter notice de 2 sprints antes de remoção

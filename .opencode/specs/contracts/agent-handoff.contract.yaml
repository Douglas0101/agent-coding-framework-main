spec_id: "contract.agent-handoff"
version: "1.0.0"
status: "approved"
domain: "agent-coding-framework"
description: >
  Define o schema obrigatorio para handoff entre agentes no framework.
  Todo payload de handoff deve validar contra este schema antes de ser aceito.
handoff_schema:
  required_fields:
    - name: "schema_version"
      type: "string"
      pattern: "^\\d+\\.\\d+\\.\\d+$"
      description: "Versao do schema de handoff"
    - name: "artifact_type"
      type: "string"
      enum: ["code-change", "test-result", "review-result", "evidence-report", "impact-report", "conformance-report", "run-manifest", "traceability-link"]
      description: "Tipo do artefato produzido"
    - name: "producer_agent"
      type: "string"
      minLength: 1
      description: "Agente que produziu o artefato"
    - name: "consumer_agent"
      type: "string"
      minLength: 1
      description: "Agente que consumira o artefato"
    - name: "spec_id"
      type: "string"
      description: "ID da spec que originou esta execucao"
    - name: "spec_version"
      type: "string"
      pattern: "^\\d+\\.\\d+\\.\\d+$"
      description: "Versao da spec"
    - name: "run_id"
      type: "string"
      minLength: 1
      description: "ID unico da execucao"
    - name: "timestamp"
      type: "string"
      format: "date-time"
      description: "Timestamp ISO8601 da producao"
    - name: "evidence_refs"
      type: "array"
      items:
        type: "string"
        minLength: 1
      description: "Referencias a evidencias que suportam o artefato"
    - name: "risk_level"
      type: "string"
      enum: ["low", "medium", "high", "critical"]
      description: "Nivel de risco do artefato"
    - name: "compatibility_assessment"
      type: "string"
      enum: ["compatible", "behavior-compatible", "risky-compatible", "breaking"]
      description: "Avaliacao de compatibilidade com specs anteriores"
    - name: "trace_links"
      type: "array"
      items:
        type: "string"
        minLength: 1
      description: "Links de rastreabilidade para requisitos e testes"
  optional_fields:
    - name: "payload"
      type: "object"
      description: "Conteudo especifico do artefato"
    - name: "idempotency_key"
      type: "string"
      description: "Chave de idempotencia para deduplicacao"
    - name: "write_scope"
      type: "string"
      description: "Escopo de escrita associado ao artefato"
    - name: "checkpoint_ref"
      type: "string"
      description: "Referencia ao checkpoint associado"
validation_rules:
  - rule: "no_partial_payload"
    description: "Payload parcial ou ambiguo deve ser rejeitado"
    action: "reject"
  - rule: "no_missing_provenance"
    description: "Artefato sem provenance (producer_agent, run_id, timestamp) deve ser rejeitado"
    action: "reject"
  - rule: "evidence_refs_resolvable"
    description: "Todas as evidence_refs devem apontar para artefatos existentes"
    action: "reject"
  - rule: "versioning_required"
    description: "schema_version e spec_version devem ser semantic versions validos"
    action: "reject"
  - rule: "compatibility_assessment_required"
    description: "compatibility_assessment deve ser explicito, nunca implicito"
    action: "reject"
  - rule: "write_scope_disjoint"
    description: "Dois handoffs com mesmo write_scope em paralelo devem ser rejeitados"
    action: "reject"
  - rule: "verifier_gate"
    description: "Handoff para synthesizer requer verified=true no artefato"
    action: "reject"

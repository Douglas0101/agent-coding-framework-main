slo_id: slo.example
version: 1.0.0
capability_ref: capability.example
description: >
  SLOs operacionais para o fluxo de exemplo.
  Estes limites são verificados pelo conformance engine após cada release.

objectives:
  - name: latency_p95
    metric: latency_percentile_95
    threshold_ms: 300
    measurement_window: 5m
    alerting_threshold_ms: 250
    error_budget_burn_rate: 1.0

  - name: availability
    metric: success_rate
    threshold_percent: 99.9
    measurement_window: 30d
    error_budget_minutes_per_month: 43.2

  - name: error_rate
    metric: error_rate
    threshold_percent: 0.1
    measurement_window: 5m

rollback_triggers:
  - condition: latency_p95_ms > 300
    action: trigger_rollback
  - condition: error_rate > 0.5
    action: trigger_rollback
  - condition: runtime_to_spec_alignment < 0.97
    action: open_incident

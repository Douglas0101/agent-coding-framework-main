slo_id: slo.routing-suite
version: 1.0.0
capability_ref: capability.bugfix.routing-suite
objectives:
  - name: routing_accuracy
    metric: percentage_of_correctly_routed_commands
    threshold: 99.9
    measurement_window: 24h
  - name: test_reliability
    metric: bun_test_pass_rate
    threshold: 100
    measurement_window: per_run
  - name: documentation_completeness
    metric: known_issues_documented
    threshold: 100
    measurement_window: per_release
rollback_triggers:
  - routing_accuracy < 99.9
  - test_reliability < 100
  - documentation_completeness < 100

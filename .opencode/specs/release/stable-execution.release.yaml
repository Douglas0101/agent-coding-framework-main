spec_id: "release.stable-execution"
version: "1.0.0"
status: "approved"
domain: "agent-coding-framework"
description: >
  Especificacao de rollout seguro e rollback para correcoes de execucao estavel.
  Define condicoes de release, triggers de rollback e estrategia de reversao.
rollout_plan:
  phase_1: "Preparacao"
    steps:
      - "Validar todas as specs (capability, behavior, contract, policy, verification)"
      - "Executar testes de regressao em ambiente isolado"
      - "Gerar golden traces do fluxo corrigido"
      - "Verificar que .opencode/opencode.json existe e esta correto"
    acceptance: "Todos os testes passam, golden traces gerados"

  phase_2: "Deploy em staging"
    steps:
      - "Aplicar specs no ambiente de staging"
      - "Executar comandos de teste: /autocode, /ship, /review, /analyze"
      - "Validar roteamento de todos os comandos"
      - "Monitorar logs por 30 minutos"
    acceptance: "Zero routing failures, zero silent fallbacks"

  phase_3: "Deploy em producao"
    steps:
      - "Aplicar specs no ambiente de producao"
      - "Monitorar metricas de roteamento por 1 hora"
      - "Validar conformance report automatico"
    acceptance: "runtime_to_spec_alignment >= 0.97"

rollback_triggers:
  - trigger: "routing_failure_rate > 0.10"
    description: "Mais de 10% dos comandos com falha de roteamento"
    action: "Reverter para versao anterior imediatamente"
    severity: "critical"

  - trigger: "wrong_agent_execution_rate > 0.01"
    description: "Mais de 1% dos comandos executados por agente errado"
    action: "Reverter e investigar causa raiz"
    severity: "critical"

  - trigger: "timeout_increase > 0.20"
    description: "Aumento de 20% ou mais nos timeouts"
    action: "Reverter e analisar policy de timeout"
    severity: "high"

  - trigger: "retry_burden_increase > 0.15"
    description: "Aumento de 15% ou mais no burden de retry"
    action: "Reverter e ajustar retry policy"
    severity: "high"

  - trigger: "runtime_to_spec_alignment < 0.97"
    description: "Alinhamento runtime-spec abaixo de 97%"
    action: "Reverter e abrir incidente"
    severity: "critical"

  - trigger: "golden_trace_regression"
    description: "Regressao em golden traces"
    action: "Reverter e corrigir antes de redeploy"
    severity: "high"

rollback_strategy:
  method: "config_revert"
  steps:
    - "Restaurar .opencode/opencode.json da versao anterior"
    - "Restaurar specs da versao anterior em .opencode/specs/"
    - "Reiniciar sessoes afetadas"
    - "Validar roteamento basico"
  estimated_time: "5 minutos"
  data_loss_risk: "none"

monitoring:
  metrics:
    - name: "routing_success_rate"
      type: "gauge"
      threshold: 0.99
      alert: "Se < 0.99 por 5 minutos"

    - name: "silent_fallback_count"
      type: "counter"
      threshold: 0
      alert: "Se > 0"

    - name: "forbidden_transition_count"
      type: "counter"
      threshold: 0
      alert: "Se > 0"

    - name: "write_scope_collision_count"
      type: "counter"
      threshold: 0
      alert: "Se > 0"

    - name: "retry_budget_exhausted_count"
      type: "counter"
      threshold: 0
      alert: "Se > 0 sem evidencia de recoverability"

  dashboards:
    - name: "Agent Routing Health"
      panels:
        - "Routing success rate over time"
        - "Agent distribution per command"
        - "Fallback events (should be zero)"
        - "State transition heatmap"

    - name: "Execution Stability"
      panels:
        - "Retry count distribution"
        - "Timeout events"
        - "Circuit breaker activations"
        - "Write scope collisions"

release_id: release.bugfix.routing-suite
version: 1.0.0
capability_ref: capability.bugfix.routing-suite
slo_ref: slo.routing-suite
strategy: progressive
stages:
  - name: canary
    percentage: 10
    bake_minutes: 15
    validation:
      - bun test routing-regression
      - opencode run --agent autocoder --command autocode "smoke test"
  - name: partial
    percentage: 50
    bake_minutes: 30
    validation:
      - bun test (full suite)
      - live routing validation
  - name: full
    percentage: 100
    bake_minutes: 60
    validation:
      - bun test (full suite)
      - regression test suite
      - documentation review
rollback:
  trigger_conditions:
    - bun test failures > 0
    - routing regression detected
    - completeness_score < 0.75
  max_rollback_minutes: 5
  requires_evidence: true
gates:
  pre_deploy:
    - spec approved
    - DAG compiled successfully
    - policy violations = 0
  post_deploy:
    - all tests passing
    - routing validation passed
    - documentation updated

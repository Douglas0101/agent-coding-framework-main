policy_bundle: routing-suite-governance
version: 1.0.0
status: draft
rules:
  - id: require_evidence_for_routing_fix
    description: Cada bug fix de routing deve ter evidencia de teste passando
    action: require_evidence
    when:
      risk_level:
        - critical
        - high
    evidence_types:
      - test_output
      - live_routing_test

  - id: require_approval_for_config_change
    description: Mudancas em configs de routing requerem aprovacao tecnica
    action: require_approval
    when:
      risk_level:
        - critical
        - high
    approvers:
      - tech-lead
      - validation

  - id: require_approval_for_implementation_nodes
    description: Nodes de implementacao requerem aprovacao para writes
    action: require_approval
    when:
      node_type:
        - implementation
    approvers:
      - tech-lead

  - id: require_field_in_manifest
    description: Run manifest deve ter completeness score >= 0.75
    action: require_field
    field: traceability_completeness_score
    constraint: ">= 0.75"

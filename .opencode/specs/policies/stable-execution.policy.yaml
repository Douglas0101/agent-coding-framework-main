spec_id: "policy.stable-execution"
version: "1.0.0"
status: "approved"
domain: "agent-coding-framework"
description: >
  Politicas obrigatorias para execucao estavel de agentes de coding.
  Define limites de retry, timeout, circuit breaker, e restricoes de escrita.
policies:
  - name: "retry_policy"
    description: "Politica de retry com limite maximo"
    rules:
      - rule: "max_attempts"
        value: 3
        description: "Numero maximo de tentativas por no"
        justification: "Acima de 3, o custo marginal supera o beneficio"
      - rule: "backoff_strategy"
        value: "exponential"
        description: "Backoff exponencial entre tentativas"
      - rule: "max_backoff_ms"
        value: 30000
        description: "Backoff maximo em milissegundos"
      - rule: "require_checkpoint_before_retry"
        value: true
        description: "Checkpoint obrigatorio antes de cada retry"

  - name: "timeout_policy"
    description: "Timeout obrigatorio por no"
    rules:
      - rule: "default_timeout_ms"
        value: 120000
        description: "Timeout padrao por no em milissegundos"
      - rule: "max_timeout_ms"
        value: 300000
        description: "Timeout maximo permitido"
      - rule: "timeout_recovery"
        value: "checkpoint_and_fail"
        description: "Acao ao atingir timeout: salvar checkpoint e falhar"

  - name: "circuit_breaker_policy"
    description: "Circuit breaker para repeticao sem progresso"
    rules:
      - rule: "stagnation_threshold"
        value: 2
        description: "Numero de iteracoes sem progresso antes de abrir circuito"
      - rule: "stagnation_detection"
        value: "no_new_evidence"
        description: "Detectar estagnacao por ausencia de nova evidencia"
      - rule: "circuit_open_action"
        value: "fail_with_evidence"
        description: "Acao ao abrir circuito: falhar com evidencia de estagnacao"

  - name: "write_scope_policy"
    description: "Politica de isolamento de escrita"
    rules:
      - rule: "disjoint_scopes"
        value: true
        description: "Write scopes devem ser disjuntos entre workers paralelos"
      - rule: "single_final_writer"
        value: "synthesizer"
        description: "Apenas o synthesizer pode escrever artefato final"
      - rule: "lock_lease_required"
        value: true
        description: "Lock/lease obrigatorio por write_scope"
      - rule: "concurrent_write_rejection"
        value: true
        description: "Rejeitar escrita concorrente no mesmo escopo"

  - name: "routing_policy"
    description: "Politica de roteamento de comandos para agentes"
    rules:
      - rule: "frontmatter_agent_binding"
        value: true
        description: "Comando com agent: no frontmatter deve ser roteado para aquele agente"
      - rule: "no_silent_fallback"
        value: true
        description: "Fallback silencioso para general e proibido"
      - rule: "fallback_requires_evidence"
        value: true
        description: "Qualquer fallback deve gerar evidencia explicita"
      - rule: "config_file_required"
        value: ".opencode/opencode.json"
        description: "Arquivo de config deve existir para merge correto"

  - name: "execution_policy"
    description: "Politica geral de execucao"
    rules:
      - rule: "verifier_gate_mandatory"
        value: true
        description: "Verifier e gate obrigatorio antes de synthesizer"
      - rule: "spec_approval_required"
        value: true
        description: "Spec aprovada obrigatoria para change surface critica"
      - rule: "idempotency_key_required"
        value: true
        description: "Idempotency key obrigatoria por run/no/artefato"
      - rule: "checkpoint_persistence"
        value: true
        description: "Checkpoint persistente por no"
      - rule: "selective_resume"
        value: true
        description: "Resume seletivo por artifact validity"
      - rule: "heartbeat_check_ms"
        value: 30000
        description: "Intervalo de heartbeat/liveness check"
      - rule: "conformance_logging"
        value: true
        description: "Log de conformidade com trace_links obrigatoria"

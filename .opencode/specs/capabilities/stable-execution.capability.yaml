spec_id: "capability.stable-execution"
version: "1.0.0"
status: "approved"
domain: "agent-coding-framework"
objective: >
  Garantir execucao estavel, sincronizada e deterministica de agentes de coding,
  eliminando loops de controle, quebras de execucao e dessincronizacao entre
  agentes, workers, handoffs e artefatos.
inputs:
  - name: "command"
    type: "string"
    required: true
    description: "Comando a ser executado com frontmatter de agent mapping"
  - name: "arguments"
    type: "string"
    required: true
    description: "Argumentos do comando"
  - name: "run_id"
    type: "string"
    required: false
    description: "Identificador unico da execucao"
  - name: "session_id"
    type: "string"
    required: true
    description: "Identificador da sessao OpenCode"
outputs:
  - name: "run_manifest"
    type: "object"
    description: "Manifesto da execucao com estado final e evidencias"
  - name: "artifacts"
    type: "array"
    description: "Artefatos produzidos sob artifacts/codex-swarm/<run_id>/"
  - name: "conformance_report"
    type: "object"
    description: "Relatorio de conformidade com a spec"
invariants:
  - "Nenhuma execucao pode entrar em loop sem budget decrescente e cutoff verificavel"
  - "Nenhuma run pode sintetizar artefato final sem verifier aprovado"
  - "Nenhum handoff pode ocorrer sem schema valido contendo schema_version, artifact_type, producer_agent, spec_id, spec_version, run_id, timestamp, evidence_refs, risk_level, compatibility_assessment, trace_links"
  - "Nenhuma reexecucao pode ocorrer sem checkpoint ou invalidacao explicita"
  - "O mesmo idempotency key deve implicar o mesmo outcome logico"
  - "Nenhum fallback de agent routing pode ocorrer sem logging explicito e evidencia"
  - "Nenhum write_scope pode ser compartilhado entre workers paralelos"
  - "O synthesizer e o unico writer final permitido"
  - "O verifier e gate obrigatorio antes de qualquer sintese final"
  - "Todo comando com agent: no frontmatter deve ser roteado para o agente especificado"
non_functional:
  latency_p95_ms: 30000
  availability_slo: 99.5
  max_retries: 3
traceability:
  owner_technical: "agent-coding-framework"
  owner_domain: "agent-orchestration"
  requirement_refs:
    - "AGENTS.md#native-swarm-rules"
    - "prompt-agent.md#missao"
    - ".opencode/commands/autocode.md"

spec_id: "behavior.stable-execution"
version: "1.0.0"
status: "approved"
domain: "agent-coding-framework"
description: >
  Maquina de estados da run de execucao estavel de agentes de coding.
  Define transicoes validas, guards e transicoes proibidas.
states:
  - name: "received"
    description: "Comando recebido, aguardando validacao inicial"
  - name: "spec_ready"
    description: "Specs validadas e prontas para compilacao"
  - name: "dag_compiled"
    description: "DAG compilado a partir das specs"
  - name: "preflight_validated"
    description: "Validacao pre-flight concluida com sucesso"
  - name: "running"
    description: "Execucao em andamento"
  - name: "waiting_dependency"
    description: "Aguardando dependencia externa"
  - name: "retrying"
    description: "Tentativa de retry apos falha controlada"
  - name: "checkpointed"
    description: "Estado salvo em checkpoint para possivel resume"
  - name: "validating"
    description: "Artefatos em validacao pelo verifier"
  - name: "verified"
    description: "Artefatos validados com sucesso"
  - name: "synthesized"
    description: "Artefato final sintetizado pelo synthesizer"
  - name: "failed"
    description: "Execucao falhou de forma irrecoveravel"
  - name: "aborted"
    description: "Execucao abortada por policy ou intervencao humana"
transitions:
  - from: "received"
    to: "spec_ready"
    guard: "specs_exist_and_valid"
    description: "Specs encontradas e validadas"
  - from: "received"
    to: "failed"
    guard: "specs_missing_or_invalid"
    description: "Specs obrigatorias ausentes ou invalidas"
  - from: "spec_ready"
    to: "dag_compiled"
    guard: "compile_succeeds"
    description: "DAG compilado com sucesso"
  - from: "spec_ready"
    to: "failed"
    guard: "compile_fails"
    description: "Falha na compilacao do DAG"
  - from: "dag_compiled"
    to: "preflight_validated"
    guard: "preflight_checks_pass"
    description: "Validacao pre-flight aprovada"
  - from: "dag_compiled"
    to: "failed"
    guard: "preflight_checks_fail"
    description: "Validacao pre-flight reprovada"
  - from: "preflight_validated"
    to: "running"
    guard: "no_blocking_issues"
    description: "Inicio da execucao"
  - from: "running"
    to: "waiting_dependency"
    guard: "dependency_missing"
    description: "Dependencia critica ausente"
  - from: "running"
    to: "retrying"
    guard: "recoverable_error AND retry_count < max_retries"
    description: "Erro recuperavel, retry autorizado"
  - from: "running"
    to: "checkpointed"
    guard: "checkpoint_requested"
    description: "Checkpoint salvo para resume futuro"
  - from: "running"
    to: "validating"
    guard: "execution_complete"
    description: "Execucao concluida, iniciando validacao"
  - from: "running"
    to: "failed"
    guard: "unrecoverable_error OR budget_exhausted"
    description: "Erro irrecuperavel ou orcamento esgotado"
  - from: "waiting_dependency"
    to: "running"
    guard: "dependency_resolved"
    description: "Dependencia resolvida, retomando execucao"
  - from: "waiting_dependency"
    to: "aborted"
    guard: "dependency_timeout"
    description: "Timeout de dependencia, abortando"
  - from: "retrying"
    to: "running"
    guard: "retry_succeeds"
    description: "Retry bem-sucedido, retomando"
  - from: "retrying"
    to: "failed"
    guard: "retry_fails OR retry_count >= max_retries"
    description: "Retry esgotado ou falhou"
  - from: "checkpointed"
    to: "running"
    guard: "resume_requested AND checkpoint_valid"
    description: "Resume a partir de checkpoint valido"
  - from: "checkpointed"
    to: "failed"
    guard: "checkpoint_corrupted"
    description: "Checkpoint corrompido, impossivel resume"
  - from: "validating"
    to: "verified"
    guard: "validation_passes"
    description: "Validacao aprovada pelo verifier"
  - from: "validating"
    to: "retrying"
    guard: "validation_fails AND retry_allowed"
    description: "Validacao falhou, retry autorizado"
  - from: "validating"
    to: "failed"
    guard: "validation_fails AND NOT retry_allowed"
    description: "Validacao falhou, sem retry"
  - from: "verified"
    to: "synthesized"
    guard: "synthesizer_authorized"
    description: "Synthesizer autorizado a consolidar"
forbidden_transitions:
  - from: "running"
    to: "running"
    reason: "Transicao circular sem progresso mensuravel"
    detection: "stagnation_detector por no"
  - from: "retrying"
    to: "retrying"
    reason: "Retry infinito sem checkpoint intermediario"
    detection: "retry_count >= max_retries"
  - from: "running"
    to: "synthesized"
    reason: "Sintese sem validacao previa pelo verifier"
    detection: "state machine guard"
  - from: "running"
    to: "running"
    reason: "Escrita paralela no mesmo write_scope"
    detection: "write_scope lock/lease"
  - from: "checkpointed"
    to: "running"
    reason: "Resume sem checkpoint integro"
    detection: "checkpoint integrity check"
  - from: "validating"
    to: "synthesized"
    reason: "Handoff sem contract validation"
    detection: "schema validation obrigatorio"
  - from: "failed"
    to: "running"
    reason: "Reexecucao sem invalidacao explicita"
    detection: "idempotency key check"

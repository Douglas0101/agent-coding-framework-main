behavior_id: behavior.bugfix.routing-suite
version: 1.0.0
capability_ref: capability.bugfix.routing-suite

initial_state: detect
terminal_states:
  - verified

states:
  - detect
  - document
  - workaround
  - harden
  - test
  - verify

transitions:
  - from: detect
    to: document
    guard: bugs_identificados >= 4
    action: Consolidar descobertas da Fase 1 em specs e documentacao
  - from: document
    to: workaround
    guard: AGENTS.md_updated AND issue_report_created AND skill_updated
    action: Criar wrapper script com pre-flight check
  - from: workaround
    to: harden
    guard: wrapper_script_created AND wrapper_executable AND preflight_implemented
    action: Avaliar seguranca de config minima valida
  - from: harden
    to: test
    guard: config_validated OR config_removed_safely
    action: Criar teste de regressao de routing
  - from: test
    to: verify
    guard: routing_regression_test_created AND bun_test_passing AND live_routing_validated
    action: Validar suite completa e gerar run manifest

forbidden:
  - from: detect
    to: verify
    reason: Pula documentacao, workaround, hardening e testes — sem evidencia suficiente
  - from: document
    to: test
    reason: Pula workaround e hardening — risco de regressao nao mitigado
  - from: workaround
    to: verify
    reason: Pula testes automatizados — sem garantia de nao-regressao

timeout_ms: 3600000

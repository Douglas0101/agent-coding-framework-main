## Adding New Domain Packs

To add a new Domain Pack:

1. Create `domains/<domain-name>/` directory
2. Add `contract.yaml` following the DomainPack contract template
3. Add `manifest.json` with pack metadata
4. Update this registry with pack information

See `templates/domain-pack/` for starter templates.

---

## Policy

- **Active:** Fully supported, backward-compatible
- **Experimental:** Under development, may have breaking changes
- **Deprecated:** Legacy, will be removed in future versions

All Domain Packs must:
1. Implement the DomainPack contract
2. Register in this registry
3. Pass CI validation against Core contracts
4. Be versioned semantically
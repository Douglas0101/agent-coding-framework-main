# Extension Registry - Domain Pack Catalog

**Schema Version:** 1.0.0  
**Registry Version:** 1.0.0  
**Last Updated:** 2026-04-03

---

## Overview

This registry lists all available Domain Packs for the Agent Orchestration Framework.
Domain Packs are contractual extensions that provide domain-specific capabilities
without coupling to the Core.

---

## Registry Schema

```yaml
registry:
  version: string
  last_updated: ISO8601
  core_version: string
  packs:
    - id: string (unique)
      name: string
      version: string
      domain: string
      description: string
      contract_path: string
      manifest_path: string
      status: enum[active, deprecated, experimental]
      dependencies: list[string]
      capabilities: list[string]
      tags: list[string]
      created: ISO8601
      updated: ISO8601
```


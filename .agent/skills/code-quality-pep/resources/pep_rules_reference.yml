# ─────────────────────────────────────────────────────────
#  PEP → Ruff Rule Cross-Reference
# ─────────────────────────────────────────────────────────
# Maps each PEP standard to the ruff rule codes that enforce it.
# Use this to understand which rules apply when fixing violations.

PEP-8:
  title: "Style Guide for Python Code"
  url: "https://peps.python.org/pep-0008/"
  ruff_rules:
    - prefix: "E1"
      category: "Indentation"
      examples: ["E111 — indentation not multiple of 4", "E117 — over-indented"]
    - prefix: "E2"
      category: "Whitespace"
      examples: ["E201 — whitespace after '('", "E231 — missing whitespace after ','"]
    - prefix: "E3"
      category: "Blank Lines"
      examples: ["E301 — expected 1 blank line", "E303 — too many blank lines"]
    - prefix: "E4"
      category: "Imports"
      examples: ["E401 — multiple imports on one line", "E402 — module level import not at top"]
    - prefix: "E5"
      category: "Line Length"
      examples: ["E501 — line too long"]
    - prefix: "E7"
      category: "Statements"
      examples: ["E711 — comparison to None", "E721 — type comparison"]
    - prefix: "W"
      category: "Warnings"
      examples: ["W291 — trailing whitespace", "W605 — invalid escape sequence"]
    - prefix: "N"
      category: "Naming"
      examples: ["N801 — class name CapWords", "N802 — function lowercase"]
    - prefix: "I"
      category: "Import Sorting"
      examples: ["I001 — import block unsorted"]

PEP-20:
  title: "The Zen of Python"
  url: "https://peps.python.org/pep-0020/"
  ruff_rules:
    - prefix: "SIM"
      category: "Simplify"
      examples: ["SIM102 — collapsible if", "SIM118 — use key in dict"]
    - prefix: "C4"
      category: "Comprehensions"
      examples: ["C400 — unnecessary generator", "C401 — unnecessary set comprehension"]
  radon:
    maintainability_index: "MI ≥ 20 = maintainable"

PEP-257:
  title: "Docstring Conventions"
  url: "https://peps.python.org/pep-0257/"
  ruff_rules:
    - prefix: "D"
      category: "Docstrings (opt-in)"
      examples: ["D100 — missing module docstring", "D205 — 1 blank line after summary"]
  note: "D rules are NOT enabled by default; add 'D' to ruff select to activate."

PEP-484:
  title: "Type Hints"
  url: "https://peps.python.org/pep-0484/"
  enforced_by: "mypy --strict"
  ruff_rules:
    - prefix: "TCH"
      category: "Type Checking Imports"
      examples: ["TCH001 — move import into TYPE_CHECKING block"]

PEP-526:
  title: "Variable Annotations"
  url: "https://peps.python.org/pep-0526/"
  enforced_by: "mypy --strict"
  note: "Prefer `x: int = 5` over `x = 5  # type: int`"

PEP-544:
  title: "Protocols — Structural Subtyping"
  url: "https://peps.python.org/pep-0544/"
  enforced_by: "mypy --strict"

PEP-585:
  title: "Generic Types in Standard Collections"
  url: "https://peps.python.org/pep-0585/"
  ruff_rules:
    - prefix: "UP006"
      category: "Use builtin generics"
      examples: ["UP006 — Use list instead of List"]
    - prefix: "UP035"
      category: "Deprecated typing imports"
      examples: ["UP035 — Import from collections.abc"]

PEP-604:
  title: "Union Types X | Y"
  url: "https://peps.python.org/pep-0604/"
  ruff_rules:
    - prefix: "UP007"
      category: "Use X | Y"
      examples: ["UP007 — Use X | Y instead of Union[X, Y]"]

# ── Security (non-PEP) ─────────────────────────────────
OWASP:
  title: "Security Best Practices"
  ruff_rules:
    - prefix: "S"
      category: "Bandit security checks"
      examples:
        - "S101 — assert used (allowed in tests)"
        - "S105 — hardcoded password"
        - "S301 — pickle usage"
        - "S602 — subprocess with shell=True"
  bandit:
    severity_levels: ["LOW", "MEDIUM", "HIGH"]
    confidence_levels: ["LOW", "MEDIUM", "HIGH"]

# ── Code Complexity (non-PEP) ───────────────────────────
Complexity:
  title: "Cyclomatic Complexity & Maintainability"
  tools:
    radon_cc:
      description: "Cyclomatic Complexity per function"
      grades: ["A (1-5)", "B (6-10)", "C (11-15)", "D (16-20)", "F (21+)"]
      threshold: "CC ≤ 10 (grade B or better)"
    radon_mi:
      description: "Maintainability Index per file"
      grades: ["A (20-100)", "B (10-19)", "C (0-9)"]
      threshold: "MI ≥ 20 (grade A)"

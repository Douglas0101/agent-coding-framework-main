# ──────────────────────────────────────────────────────────────
# ITCH Pipeline — Canonical Parameter Reference
#
# This file documents EVERY tunable parameter in the pipeline.
# All modules read from config/itch_pipeline.yml; this reference
# provides the authoritative type, default, valid range, and
# which module consumes each parameter.
# ──────────────────────────────────────────────────────────────

# ── Paths ─────────────────────────────────────────────────────
paths:
  raw_dir:
    type: string
    default: "data/raw"
    description: "Directory containing raw ITCH binary files"
    consumed_by: "pipeline.py → ITCHPipeline.run_batch()"

  processed_dir:
    type: string
    default: "data/processed/itch"
    description: "Root output directory for Parquet datasets"
    consumed_by: "storage.py → ParquetWriter.__init__()"

  interim_dir:
    type: string
    default: "data/interim"
    description: "Intermediate processing artifacts (rarely used)"
    consumed_by: "pipeline.py (reserved)"

# ── Parser ────────────────────────────────────────────────────
parser:
  chunk_size_mb:
    type: integer
    default: 64
    valid_range: [8, 512]
    unit: "megabytes"
    description: "Read buffer size. Multiplied by 1048576 to get bytes."
    consumed_by: "parser.py → ITCHParser.__init__(chunk_size=)"
    tuning_notes: >
      Larger values reduce syscall overhead but increase memory.
      128 MB is optimal for NVMe; 32 MB for HDD.

  skip_unknown_types:
    type: boolean
    default: true
    description: "Silently skip unrecognised message types instead of raising"
    consumed_by: "parser.py → ITCHParser.__init__(skip_unknown=)"

# ── Pipeline Orchestrator ─────────────────────────────────────
pipeline:
  max_workers:
    type: integer
    default: 2
    valid_range: [1, 8]
    description: "Reserved — run_batch() currently processes files sequentially"
    consumed_by: "pipeline.py → ITCHPipeline.run_batch() (parameter accepted but NOT used for concurrency)"
    tuning_notes: "Pipeline processes files one at a time because each file saturates I/O and memory. This param is reserved for future parallel support."

  queue_maxsize:
    type: integer
    default: 10000
    valid_range: [1000, 100000]
    description: "Async backpressure queue depth for message buffering"
    consumed_by: "pipeline.py → ITCHPipeline.run() (queue connects parser.async_parse_file → book building)"
    tuning_notes: "Higher values = more memory, less contention. Value is hardcoded in parser.py async_parse_file at 10,000."

  gc_interval:
    type: integer
    default: 50000
    valid_range: [1000, 500000]
    unit: "messages"
    description: "Call gc.collect() every N processed messages"
    consumed_by: "pipeline.py → ITCHPipeline.run()"
    tuning_notes: >
      Lower values reduce memory spikes but slow throughput.
      Set to 10000 for low-memory environments (<8 GB RAM).

# ── Order Book ────────────────────────────────────────────────
order_book:
  snapshot_interval_ms:
    type: integer
    default: 1000
    valid_range: [100, 60000]
    unit: "milliseconds"
    description: "Emit a book snapshot for each ticker every N ms"
    consumed_by: "order_book.py → BookBuilder.__init__(snapshot_interval_ns=N*1e6)"
    tuning_notes: "100ms for HFT analysis; 1000ms for daily aggregation"

  depth:
    type: integer
    default: 10
    valid_range: [1, 50]
    description: "Number of price levels per side (bid/ask) in snapshots"
    consumed_by: "order_book.py → BookBuilder.__init__(depth=)"

# ── Feature Engineering ───────────────────────────────────────
features:
  vpin_buckets:
    type: integer
    default: 50
    valid_range: [10, 200]
    description: "Number of equal-volume buckets for VPIN rolling window"
    consumed_by: "microstructure.py → compute_vpin(n_buckets=)"

  volatility_window:
    type: string
    default: "5min"
    valid_values: ["1min", "5min", "15min", "30min", "1h"]
    description: "Rolling window for realised volatility computation"
    consumed_by: "microstructure.py → compute_realized_volatility(window=)"

  ohlcv_freq:
    type: string
    default: "1min"
    valid_values: ["1min", "5min", "15min", "30min", "1h"]
    description: "Time-bar frequency for OHLCV aggregation"
    consumed_by: "ohlcv.py → aggregate_ohlcv(freq=)"

# ── Storage ───────────────────────────────────────────────────
storage:
  compression:
    type: string
    default: "zstd"
    valid_values: ["zstd", "snappy", "lz4", "gzip", "none"]
    description: "Parquet compression codec"
    consumed_by: "storage.py → ParquetWriter.__init__(compression=)"
    output_schemas: ["TRADE_SCHEMA", "OHLCV_SCHEMA", "book_snapshot (dynamic)"]

  compression_level:
    type: integer
    default: 3
    valid_range: [1, 22]
    description: "Codec-specific compression level (zstd: 1=fast, 22=best)"
    consumed_by: "storage.py → ParquetWriter.__init__(compression_level=)"
    tuning_notes: "3 is the sweet spot for zstd (fast + good ratio)"
    output_schemas: ["TRADE_SCHEMA", "OHLCV_SCHEMA", "book_snapshot (dynamic)"]

  row_group_size:
    type: integer
    default: 131072
    valid_range: [4096, 1048576]
    unit: "rows"
    description: "Number of rows per Parquet row-group"
    consumed_by: "storage.py → ParquetWriter.__init__(row_group_size=)"
    tuning_notes: "128K default; larger = fewer row-groups, better compression"
    output_schemas: ["TRADE_SCHEMA", "OHLCV_SCHEMA", "book_snapshot (dynamic)"]

  partitioning:
    type: list[string]
    default: ["date", "ticker"]
    description: "Hive-style partition columns in output directory hierarchy"
    consumed_by: "storage.py → ParquetWriter._write()"
    output_schemas: ["All datasets — partitioned by date=/ticker="]

# ── Ticker Filter ─────────────────────────────────────────────
tickers:
  type: list[string]
  default: []
  description: "Tickers to process. Empty list = ALL tickers."
  consumed_by: "pipeline.py → ITCHPipeline.run(tickers=)"
  cli_override: "--tickers AAPL,MSFT,TSLA"

# ── Execution Engine ──────────────────────────────────────────
engine:
  mode:
    type: string
    default: "python"
    valid_values: ["python", "cpp"]
    description: "Execution engine mode for ITCH 5.0 path"
    consumed_by: "pipeline.py → ITCHPipeline.engine_mode"
    cli_override: "--engine python|cpp"

  fallback_to_python:
    type: boolean
    default: true
    description: "Fallback to Python path when C++ module is unavailable"
    consumed_by: "pipeline.py → ITCHPipeline.engine_fallback_to_python"

  module_name:
    type: string
    default: "itch_cpp_engine"
    description: "Python import name for C++ bindings module"
    consumed_by: "cpp_adapter.py → CppEngineAdapter(module_name=...)"

  shared_library_path:
    type: string|null
    default: null
    description: "Optional absolute path to libitch_cpp_engine.so for ctypes scanner"
    consumed_by: "pipeline.py → CppEngineAdapter(shared_library_path=...)"

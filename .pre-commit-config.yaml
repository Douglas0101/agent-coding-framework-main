repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args:
          - --baseline
          - .secrets.baseline
          - --force-use-all-plugins
        exclude: |
          (?x)^(
            \.internal/tests/.*|
            \.agent/skills/.*
          )$

  - repo: local
    hooks:
      - id: sensitive-patterns-scan
        name: sensitive-patterns-scan
        entry: python .internal/scripts/scan_sensitive_patterns.py
        language: system
        pass_filenames: true
        types: [text]

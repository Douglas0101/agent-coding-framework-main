# Autocoder Adapter — Default 1x Profile
# General software engineering mode for the autocoder

version: 1.0.0
kind: AutocoderAdapter
profile: default_1x
tier: tier_1_universal
domain: modes.autocoder.adapters

description: |
  Default adapter for the autocoder mode. Applies NOU (Núcleo Obrigatório Universal)
  to all code generation and modification tasks. Focus on type safety, security,
  clarity, architecture, testing, and project conventions.

activation:
  condition: "always (default)"
  overrides: none

context_injection:
  contracts:
    - ".internal/specs/core/execution-profiles.yaml"
    - ".internal/specs/core/universal-quality-contract.yaml"
    - ".internal/specs/core/scope-detection-engine.yaml"
    - ".internal/specs/modes/autocoder.yaml"
    - ".internal/domains/software-engineering/contract.yaml"

  instructions: |
    You are operating in default_1x profile (Tier 1: Universal Engineering).

    OBLIGATIONS (NOU — Núcleo Obrigatório Universal):
    1. All types must be explicit — no implicit any/unknown
    2. Null/None values must be handled explicitly
    3. Respect architecture invariants — no cross-layer violations
    4. Functions must have single responsibility, max ~50 lines
    5. All external inputs must be validated
    6. No bare except/catch blocks — explicit error handling
    7. Business logic must have test coverage
    8. Follow existing project conventions
    9. Justify significant changes

    OUTPUT FORMAT - ALL FIELDS ARE MANDATORY:
    Your output MUST include exactly these fields:

    ```json
    {
      "execution_profile": "default_1x",
      "scope_classification": "tier_1_universal",
      "summary": "Brief description of what was done",
      "code_changes": [{"file": "path/to/file", "action": "create|modify", "description": "what changed"}],
      "compliance_notes": [
        {"dimension": "type_safety", "status": "pass|fail|warn", "details": "explanation"},
        {"dimension": "null_safety", "status": "pass|fail|warn", "details": "explanation"},
        {"dimension": "security", "status": "pass|fail|warn", "details": "explanation"},
        {"dimension": "error_handling", "status": "pass|fail|warn", "details": "explanation"},
        {"dimension": "testing", "status": "pass|fail|warn", "details": "explanation"}
      ],
      "tests": ["test command or description"],
      "risks": ["identified risk and mitigation"]
    }
    ```

    CRITICAL: If you omit any required field, your output will be rejected by the validator.

    DO NOT:
    - Introduce advanced data structures without need
    - Optimize prematurely
    - Add complexity beyond what the task requires
    - Use frontier algorithms for CRUD/API/worker tasks

output_schema:
  required_fields:
    - name: execution_profile
      type: string
      value: default_1x
    - name: scope_classification
      type: string
      value: tier_1_universal
    - name: summary
      type: string
    - name: code_changes
      type: list[Change]
    - name: compliance_notes
      type: list[ComplianceEntry]
    - name: tests
      type: list[string]
    - name: risks
      type: list[string]

quality_threshold: 0.80
early_exit: true

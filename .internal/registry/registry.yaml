# Extension Registry — Domain Pack Catalog
# This file is valid YAML and parseable by yaml.safe_load()
# Schema Version: 1.0.0
# Registry Version: 1.0.0

registry:
  version: "1.0.0"
  last_updated: "2026-04-04"
  core_version: ">=1.0.0"

  # ── Schema Reference ──────────────────────────────────────
  # Each pack entry must conform to:
  #   id: string (unique)
  #   name: string
  #   version: string (semver)
  #   domain: string
  #   description: string
  #   contract_path: string (relative to .internal/)
  #   manifest_path: string (relative to .internal/)
  #   status: enum[active, deprecated, experimental]
  #   dependencies: list[string] (pack IDs)
  #   capabilities: list[string]
  #   tags: list[string]
  #   created: ISO8601
  #   updated: ISO8601

  packs:
    # ── Functional Pack ─────────────────────────────────────
    - id: pack-software-engineering
      name: Software Engineering Pack
      version: "1.0.0"
      domain: software-engineering
      description: >
        Default functional pack for software engineering workflows.
        Provides agents for code analysis, refactoring, testing, and review.
      contract_path: domains/software-engineering/contract.yaml
      manifest_path: domains/software-engineering/manifest.json
      status: active
      dependencies: []
      capabilities:
        - code_analysis
        - code_generation
        - refactoring
        - test_generation
        - code_review
        - vulnerability_detection
        - documentation_generation
        - dependency_management
        - backend_reliability
        - data_structures_rigor
        - dba_governance
        - design_patterns
        - test_coverage
      tags:
        - functional
        - software
        - development
      created: "2026-04-03"
      updated: "2026-04-03"

    # ── Vertical Pack (Experimental) ────────────────────────
    - id: pack-ml-ai
      name: ML/AI Domain Pack
      version: "1.0.0"
      domain: ml-ai
      description: >
        Optional domain pack for machine learning and AI workflows.
        Provides capabilities for model training, evaluation, optimization,
        experiment tracking, and MLOps integration.
      contract_path: domains/ml-ai/contract.yaml
      manifest_path: domains/ml-ai/manifest.json
      status: experimental
      dependencies:
        - pack-software-engineering
      capabilities:
        - model_training
        - experiment_tracking
        - model_optimization
        - ml_pipeline
        - agentic_rag
      tags:
        - domain
        - ml
        - ai
        - optional
      created: "2026-04-03"
      updated: "2026-04-03"

    # ── Vertical Pack (Experimental) ────────────────────────
    - id: pack-medical-imaging
      name: Medical Imaging Domain Pack
      version: "1.0.0"
      domain: medical-imaging
      description: >
        Optional domain pack for medical imaging analysis workflows.
        Provides capabilities for classification, segmentation,
        specialist ensemble, and medical report generation.
      contract_path: domains/medical-imaging/contract.yaml
      manifest_path: domains/medical-imaging/manifest.json
      status: experimental
      dependencies:
        - pack-software-engineering
        - pack-ml-ai
      capabilities:
        - image_classification
        - segmentation
        - specialist_ensemble
        - medical_reporting
        - radiology_workflow
      tags:
        - domain
        - medical
        - imaging
        - optional
        - healthcare
      created: "2026-04-03"
      updated: "2026-04-03"

    # ── Vertical Pack (Experimental) ────────────────────────
    - id: pack-ioi-gold-compiler
      name: IOI Gold Compiler
      version: "1.0.0"
      domain: ioi-gold-compiler
      description: >
        Optional domain pack for advanced algorithmic, competitive programming,
        and performance-critical code generation. Implements the NOE (Núcleo
        Obrigatório Especializado) for the Hybrid Core 1x/2x system.
      contract_path: domains/ioi-gold-compiler/contract.yaml
      manifest_path: domains/ioi-gold-compiler/manifest.json
      status: experimental
      dependencies:
        - pack-software-engineering
      capabilities:
        - frontier_algorithm_selection
        - complexity_certification
        - stress_test_generation
        - memory_bound_analysis
        - algorithmic_validation
        - competitive_pattern_recognition
        - invariant_documentation
      tags:
        - vertical
        - algorithmic
        - competitive
        - performance
        - optional
      created: "2026-04-04"
      updated: "2026-04-04"

  # ── Policy ────────────────────────────────────────────────
  # Active: Fully supported, backward-compatible
  # Experimental: Under development, may have breaking changes
  # Deprecated: Legacy, will be removed in future versions
  #
  # All Domain Packs must:
  #   1. Implement the DomainPack contract
  #   2. Register in this registry
  #   3. Pass CI validation against Core contracts
  #   4. Be versioned semantically

      - tarjan
      - bridge detection
      - articulation point
      - heavy-light
      - hld
      - centroid
      - subset
      - superset
      - bitmask
      - binary search
      - max flow
      - min cost
      - mcmf
    weight: 1

  constraints:
    max_n_for_escalation: 100000
    max_q_for_escalation: 100000
    max_m_for_escalation: 100000
    weight: 2

  structural_patterns:

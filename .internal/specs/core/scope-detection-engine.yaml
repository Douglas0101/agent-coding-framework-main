# Scope Detection Engine
# Classifies tasks into operational tiers and determines execution profile

version: 1.0.0
kind: ScopeDetectionEngine
domain: core.scope

triggers:
  complexity_indicators:
    keywords:
      - optimize
      - performance
      - low latency
      - graph
      - tree
      - flow
      - substring
      - palindrome
      - range query
      - quantile
      - dynamic connectivity

# Orchestration Contract - Core Domain-Agnostic Specification

**Spec Version:** 1.0.0  
**Kind:** CoreContract  
**Domain:** core.orchestration  
**Status:** Active

---

## 1. Interface Definitions

### 1.1 Agent Interface

```yaml
interfaces:
  Agent:
    required_methods:
      - name: execute
        params:
          - context: ExecutionContext
        returns: Result
      - name: validate_input
        params:
          - input: Any
        returns: ValidationResult
      - name: get_capabilities
        params: []
        returns: AgentCapabilities

  ExecutionContext:
    required_fields:
      - run_id: string
      - task: string
      - workspace: string
      - evidence_trail: EvidenceTrail
      - handoff_context: optional[HandoffContext]
      - session_state: optional[SessionState]
      - boundary: BoundaryConfig

  Result:
    required_fields:
      - status: ResultStatus (success|failure|partial)
      - artifacts: list[Artifact]
      - evidence_refs: list[string]
      - metrics: ExecutionMetrics
      - next_agent: optional[string]

  ResultStatus:
    enum: [success, failure, partial]
```

### 1.2 Orchestrator Interface

```yaml
interfaces:
  Orchestrator:
    required_methods:
      - name: orchestrate
        params:
          - workflow: WorkflowDefinition
          - agents: list[Agent]
        returns: OrchestrationResult
      - name: plan
        params:
          - task: string
        returns: ExecutionPlan
      - name: validate_plan
        params:
          - plan: ExecutionPlan
        returns: ValidationResult

  WorkflowDefinition:
    required_fields:
      - name: string
      - version: string
      - stages: list[Stage]
      - boundary: BoundaryConfig

  Stage:
    required_fields:
      - name: string
      - agent: string
      - depends_on: list[string]
      - gate: optional[string]
      - timeout: int (seconds)
```

### 1.3 Gate Interface

```yaml
interfaces:
  Gate:
    required_methods:
      - name: evaluate
        params:
          - context: ExecutionContext
          - input: Any
        returns: GateDecision
      - name: configure
        params:
          - config: GateConfig
        returns: void

  GateDecision:
    required_fields:
      - passed: boolean
      - reason: string
      - constraints: optional[list[string]]
      - metadata: dict

  GateConfig:
    required_fields:
      - gate_type: string
      - strict_mode: boolean
      - fail_fast: boolean
```

---

## 2. Protocol Definitions

### 2.1 Verifier Protocol

```yaml
protocols:
  Verifier:
    interface: Gate
    description: "Mandatory pre-synthesis gate that validates execution state"
    contract:
      must_validate:
        - evidence_integrity
        - handoff_compliance
        - boundary_constraints
      must_reject_if:
        - evidence_tampered
        - required_evidence_missing
        - handoff_contract_violated
      may_approve_if:
        - partial_success_with_rationale
        - gracefull_degradation
    implementation_pattern: "Plugin-based, domain-agnostic"
```

### 2.2 Synthesizer Protocol

```yaml
protocols:
  Synthesizer:
    interface: Agent
    description: "Single final writer for run package artifacts"
    contract:
      must_produce:
        - final_artifact
        - summary_report
        - trace_links
      must_preserve:
        - all_evidence_refs
        - handoff_history
        - execution_metrics
      must_not:
        - modify_evidence_trail
        - omit_any_verifier_output
    implementation_pattern: "Template-based, configurable output format"
```

### 2.3 Handoff Protocol

```yaml
protocols:
  Handoff:
    description: "Formal transfer of control and context between agents"
    contract:
      required_fields:
        - schema_version: string
        - artifact_type: string
        - producer_agent: string
        - consumer_agent: string
        - spec_id: string
        - spec_version: string
        - run_id: string
        - timestamp: ISO8601
        - evidence_refs: list[string]
        - risk_level: RiskLevel
        - compatibility_assessment: string
        - trace_links: list[string]
      validation_rules:
        - no_partial_payload
        - no_missing_provenance
        - evidence_refs_resolvable
        - versioning_required
        - write_scope_disjoint
        - verifier_gate_passed
```

---

## 3. Evidence Protocol

```yaml
protocols:
  Evidence:
    description: "Immutable, auditable data produced by agents"
    contract:
      properties:
        - immutable: true
        - timestamp: ISO8601
        - producer: agent_id
        - integrity: cryptographic_hash
        - cross_domain: true
      forbidden_operations:
        - modify
        - sanitize
        - overwrite
        - delete
      required_metadata:
        - run_id
        - stage
        - boundary
        - risk_level
```

---

## 4. Invariant Enforcement

This contract enforces the following constitutional invariants:

| Invariant | Statement | Enforcement |
|-----------|-----------|-------------|
| INV-001 | Core remains domain-agnostic | Static analysis |
| INV-002 | Domain-specific capabilities use DomainPack contract | Runtime exception |
| INV-003 | Evidence Trail is immutable and cross-domain | Cryptographic verification |
| INV-004 | Handoff Contracts are backward-compatible | CI validation |
| INV-005 | Verifier/Synthesizer are Core protocols | Interface segregation |

---

## 5. Versioning

- **Major:** Breaking changes to interfaces or protocols
- **Minor:** New capabilities, backward-compatible extensions
- **Patch:** Documentation, clarifications, examples

All breaking changes require:
1. RFC public for 7 days
2. Unanimous Core maintainer approval
3. Explicit migration plan
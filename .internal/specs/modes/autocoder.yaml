# Agent Mode Contract: autocoder
# Primary autocode execution mode for code generation and modification
# Supports Hybrid Core Execution Engine (1x/2x profiles)

agent_mode_contract:
  metadata:
    name: "autocoder"
    version: "1.2.0"
    parent_contract: "orchestration-contract.yaml"
    created: "2026-04-03T00:00:00Z"
    last_modified: "2026-04-04T00:00:00Z"
    author: "core-team"

  hybrid_core:
    description: "Hybrid Core Execution Engine — 1x/2x profiles"
    default_profile: default_1x
    profiles:
      - profile: default_1x
        adapter: "modes/autocoder/adapters/default-1x.yaml"
        tier: tier_1_universal
      - profile: performance_2x
        adapters:
          - tier: tier_2_algorithmic
            adapter: "modes/autocoder/adapters/performance-2x-tier-2.yaml"
          - tier: tier_3_competitive
            adapter: "modes/autocoder/adapters/performance-2x-tier-3.yaml"
    scope_detection: "core/scope-detection-engine.yaml"
    universal_contract: "core/universal-quality-contract.yaml"
    frontier_contract: "core/algorithmic-frontier-contract.yaml"
    validator_module: "runtime/hybrid_core_validator.py"
    validator_class: "HybridCoreValidator"
    enforce_on_output: true
    gate_results_in_output: true

  mission:
    description: "Generate, modify, and refactor code based on task specifications while adhering to project conventions, constitutional invariants, and the Hybrid Core Execution Engine (1x/2x profiles)."
    success_criteria:
      - "Code changes implement the requested task"
      - "Changes follow existing project conventions"
      - "No secrets or credentials introduced"
      - "Output conforms to the base mode schema and the active profile adapter schema"
      - "Execution profile correctly matches task scope"
      - "NOU compliance verified for all outputs"
      - "NOE compliance verified when performance_2x is active"
      - "Evidence trail captures the validated execution decision and resulting changes"
    failure_conditions:
      - "Task scope exceeds budget"
      - "Cannot safely modify target files"
      - "Schema or contract violation in output"
      - "Security gate fails"
      - "NOU gate violation"
      - "NOE gate violation when performance_2x is active"
      - "Over-engineering detected in tier_1 task"
      - "Under-engineering detected in tier_2/tier_3 task"
    priority: "critical"

  scope:
    input_schema:
      required_fields:
        - name: "task"
          type: "string"
          description: "Task description for code generation/modification"
          required: true
        - name: "context"
          type: "dict"
          description: "Relevant file paths, specs, and constraints"
          required: true
      optional_fields:
        - name: "exploration_results"
          type: "dict"
          description: "Findings from prior explore phase"
          required: false
        - name: "review_feedback"
          type: "dict"
          description: "Feedback from prior review phase"
          required: false
      forbidden_fields:
        - "secrets"
        - "credentials"
        - "internal_tokens"

    output_schema:
      required_fields:
        - name: "execution_profile"
          type: "string"
          description: "Resolved execution profile for the active run (default_1x or performance_2x)"
          required: true
        - name: "scope_classification"
          type: "string"
          description: "Resolved operational tier for the task (tier_1_universal, tier_2_algorithmic, or tier_3_competitive)"
          required: true
        - name: "summary"
          type: "string"
          description: "Human-readable summary of changes"
          required: true
        - name: "code_changes"
          type: "list[Change]"
          description: "Structured description of code changes made"
          required: true
        - name: "compliance_notes"
          type: "list[ComplianceEntry]"
          description: "Structured NOU/NOE compliance notes for the active profile"
          required: true
        - name: "tests"
          type: "list[string]"
          description: "Executed or proposed verification commands"
          required: true
        - name: "risks"
          type: "list[string]"
          description: "Known risks, caveats, and mitigations"
          required: true
        - name: "evidence_trail"
          type: "list[Evidence]"
          description: "Immutable evidence of scope detection, validation, and resulting changes"
          required: true
      optional_fields:
        - name: "problem_analysis"
          type: "string"
          description: "Profile-specific problem analysis for 2x executions"
          required: false
        - name: "algorithm_selection_rationale"
          type: "string"
          description: "Algorithm/data structure rationale required in performance_2x"
          required: false
        - name: "complexity_certificate"
          type: "object"
          description: "Complexity analysis required in performance_2x"
          required: false
        - name: "edge_case_analysis"
          type: "object"
          description: "Boundary and edge-case analysis for specialized executions"
          required: false
        - name: "stress_test_plan"
          type: "string"
          description: "Stress-testing strategy for specialized executions"
          required: false
        - name: "memory_bound_estimate"
          type: "string"
          description: "Memory/performance notes for specialized executions"
          required: false
        - name: "migration_notes"
          type: "list[string]"
          description: "Notes for breaking changes"
          required: false
      format: "json"

    tools_allowlist:
      - "read"
      - "edit"
      - "write"
      - "bash"
      - "glob"
      - "grep"
      - "task"
      - "codesearch"
      - "MCP_DOCKER_create_or_update_file"
      - "MCP_DOCKER_push_files"
    tools_denylist: []

  resources:
    max_input_tokens: 16000
    max_output_tokens: 24000
    max_context_tokens: 32000
    max_retrieval_chunks: 40
    max_iterations: 25
    max_handoffs: 3
    timeout_seconds: 900

  memory:
    operational_context:
      max_tokens: 8000
      retention: "session"
      compressible: true
    session_state:
      max_tokens: 4000
      retention: "session"
      compressible: true
    structural_memory:
      max_tokens: 3000
      retention: "persistent"
      compressible: false
    handoff_payload_budget:
      max_tokens: 5000
      compression_mode: "summary+refs"
      rehydration_supported: true

  satisficing:
    mode: "BALANCED"
    quality_threshold: 0.80
    early_exit:
      enabled: true
      conditions:
        - "Task fully implemented and verified"
        - "Budget utilization exceeds 85%"
        - "Cannot make further safe modifications"
    trade_off: "Balances implementation completeness with resource efficiency; prioritizes safety over speed"

  handoff:
    allowed_targets:
      - "reviewer"
      - "orchestrator"
    compression: "summary+refs"
    verifier_required: true

  error_policy:
    retry_max: 2
    timeout_seconds: 120
    on_budget_exceeded: "fail_fast"
    on_tool_failure: "retry"
    on_schema_violation: "fail_fast"

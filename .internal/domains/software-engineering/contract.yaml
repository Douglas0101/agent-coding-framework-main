contract:
  version: 1.0.0
  kind: DomainPackContract
  domain: software-engineering
  pack_id: pack-software-engineering
  description: |
    Default functional pack providing software engineering workflow capabilities.
    This is the foundational pack that provides core development capabilities
    as examples and defaults for the framework.
  core_version_required: ">=1.0.0"

domain:
  name: Software Engineering
  type: functional
  description: |
    Provides agents and workflows for software development tasks including
    code analysis, refactoring, testing, documentation, and review.
  capabilities:
    - code_analysis
    - code_generation
    - refactoring
    - test_generation
    - code_review
    - vulnerability_detection
    - documentation_generation
    - dependency_management
    - backend_reliability
    - data_structures_rigor
    - dba_governance
    - design_patterns
    - test_coverage

agents:
  - name: analyze
    role: exploration
    description: Explores codebase, identifies patterns, gathers evidence
    capabilities:
      - code_search
      - pattern_detection
      - dependency_analysis
    input_schema:
      type: object
      properties:
        query:
          type: string
        scope:
          type: string
      required: [query]
    output_schema:
      type: object
      properties:
        findings:
          type: array
        evidence:
          type: array

  - name: reviewer
    role: analysis
    description: Analyzes code quality, security, patterns
    capabilities:
      - code_quality_analysis
      - security_scan
      - pattern_analysis
    input_schema:
      type: object
      properties:
        target:
          type: string
        analysis_type:
          type: string
      required: [target]
    output_schema:
      type: object
      properties:
        issues:
          type: array
        recommendations:
          type: array

gates:
  - name: code_quality_gate
    type: quality
    description: Validates code meets quality thresholds
    config:
      strict_mode: true
      fail_fast: true
    validation_rules:
      - rule: complexity_threshold
        params:
          max_cyclomatic: 15
          max_cognitive: 10
      - rule: security_scan
        params:
          severity_threshold: medium

dependencies:
  required: []
  optional: []

compliance:
  invariant_enforcement:
    - invariant: INV-001
      method: static_analysis
      verify: "No domain-specific logic in core layer"
    - invariant: INV-002
      method: contract_validation
      verify: "Implements DomainPack interface"
    - invariant: INV-003
      method: cryptographic_verification
      verify: "Evidence trail immutable"

  compatibility:
    core_protocols:
      - Verifier
      - Synthesizer
      - Handoff
    contract_version: "1.0.0"

metadata:
  author: Framework Team
  license: MIT
  repository: ""
  tags:
    - functional
    - software
    - development
  created: 2026-04-03
  updated: 2026-04-03
  status: active
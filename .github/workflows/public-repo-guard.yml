name: Public Repo Guard

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

permissions:
  contents: read
  security-events: write

jobs:
  public-repo-guard:
    name: Public Repo Guard (Required)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate forbidden paths against versioned allowlist
        run: |
          python - <<'PY'
          import fnmatch
          import json
          import subprocess
          import sys
          from pathlib import Path

          allowlist_file = Path('.github/security/public-repo-allowlist.json')
          if not allowlist_file.exists():
              print(f"ERROR: missing allowlist file: {allowlist_file}")
              sys.exit(1)

          allowlist = json.loads(allowlist_file.read_text(encoding='utf-8'))
          allowed_patterns = [item['pattern'] for item in allowlist.get('path_exceptions', [])]

          forbidden_patterns = [
              '.agent/**',
              '.codex/**',
              '.opencode/**',
              '**/.env',
              '**/.env.*',
              '**/id_rsa',
              '**/id_ed25519',
              '**/*.pem',
              '**/*.p12',
              '**/*.pfx',
              '**/*secret*',
              '**/*credentials*'
          ]

          tracked = subprocess.check_output(['git', 'ls-files'], text=True).splitlines()

          violations = []
          for path in tracked:
              blocked = any(fnmatch.fnmatch(path, p) for p in forbidden_patterns)
              if not blocked:
                  continue
              allowlisted = any(fnmatch.fnmatch(path, p) for p in allowed_patterns)
              if not allowlisted:
                  violations.append(path)

          if violations:
              print('Forbidden public-repo paths detected (not allowlisted):')
              for v in violations:
                  print(f' - {v}')
              print(f'\nReview and, if intentional, version an explicit exception in {allowlist_file}.')
              sys.exit(1)

          print('Forbidden path validation passed.')
          PY

      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Scan for sensitive operational config patterns
        run: python scripts/scan_sensitive_patterns.py

  precommit-integrity:
    name: Pre-commit Integrity (Optional)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pre-commit tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install pre-commit detect-secrets

      - name: Validate pre-commit config
        run: pre-commit validate-config

      - name: Validate detect-secrets baseline
        run: detect-secrets scan --all-files --baseline .secrets.baseline --force-use-all-plugins

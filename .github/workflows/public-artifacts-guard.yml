name: Public Boundary Check

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  public-boundary:
    name: Public Boundary Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate public/internal boundary
        run: ./scripts/check-public-boundary.sh

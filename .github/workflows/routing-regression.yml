name: Routing Regression

on:
  push:
    branches: [main, master]
    paths:
      - '.opencode/**'
      - 'opencode.json'
      - 'AGENTS.md'
      - 'scripts/**'
      - 'tests/**'
  pull_request:
    branches: [main, master]
    paths:
      - '.opencode/**'
      - 'opencode.json'
      - 'AGENTS.md'
      - 'scripts/**'
      - 'tests/**'

jobs:
  routing-regression:
    name: Routing Regression Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: .opencode
        run: bun install

      - name: Run routing regression tests
        working-directory: .opencode
        run: bun test routing-regression

  stable-execution-tests:
    name: Stable Execution Tests (Python)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest

      - name: Run stable execution tests
        run: python -m pytest tests/test_stable_execution.py -v

  full-test-suite:
    name: Full Test Suite
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'push' || github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: .opencode
        run: bun install

      - name: Run full test suite
        working-directory: .opencode
        run: bun test

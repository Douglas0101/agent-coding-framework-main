contract:
  version: 1.0.0
  kind: DomainPackContract
  domain: ml-ai
  pack_id: pack-ml-ai
  description: |
    Optional domain pack for machine learning and AI workflows.
    Provides capabilities for model training, evaluation, optimization,
    experiment tracking, MLOps integration, and agentic RAG.
  core_version_required: ">=1.0.0"

domain:
  name: Machine Learning / AI
  type: vertical
  description: |
    Specializes in ML/AI development workflows including training pipelines,
    experiment management, model optimization, and AI agent orchestration.
  capabilities:
    - model_training
    - experiment_tracking
    - model_optimization
    - ml_pipeline
    - hyperparameter_tuning
    - agentic_rag
    - model_lineage
    - data_contracts

agents:
  - name: ml-researcher
    role: research
    description: Researches ML techniques, papers, and best practices
    capabilities:
      - paper_search
      - technique_analysis
      - benchmark_comparison

  - name: ml-engineer
    role: development
    description: Develops and trains ML models
    capabilities:
      - model_architecture
      - data_preprocessing
      - training_loop
      - evaluation

  - name: ml-optimizer
    role: optimization
    description: Optimizes ML models for performance and efficiency
    capabilities:
      - hyperparameter_search
      - quantization
      - pruning
      - distillation

gates:
  - name: ml_validation_gate
    type: validation
    description: Validates ML model quality and metrics
    config:
      strict_mode: true
      fail_fast: true
    validation_rules:
      - rule: metric_threshold
        params:
          min_accuracy: 0.7
          min_f1: 0.6
      - rule: data_contract
        params:
          enforce_schema: true

dependencies:
  required:
    - pack_id: pack-software-engineering
      version: ">=1.0.0"
  optional: []

compliance:
  invariant_enforcement:
    - invariant: INV-001
      method: static_analysis
      verify: "No domain-specific logic in core layer"
    - invariant: INV-002
      method: contract_validation
      verify: "Implements DomainPack interface"
    - invariant: INV-003
      method: cryptographic_verification
      verify: "Evidence trail immutable"

  compatibility:
    core_protocols:
      - Verifier
      - Synthesizer
      - Handoff
    contract_version: "1.0.0"

metadata:
  author: Framework Team
  license: MIT
  repository: ""
  tags:
    - domain
    - ml
    - ai
    - optional
    - experimental
  created: 2026-04-03
  updated: 2026-04-03
  status: experimental